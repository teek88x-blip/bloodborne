<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Log — Bloodborne</title>
<link rel="stylesheet" href="shared.css">
<style>
.back-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;font-family:var(--font-display);color:var(--text-dim);text-decoration:none;transition:color var(--transition)}
.back-link:hover{color:var(--accent-s)}
.section-intro{text-align:center;color:var(--text-dim);font-size:0.75rem;margin-bottom:1rem;font-style:italic}
.session-tabs{display:flex;border-bottom:1px solid var(--border-sub);margin-bottom:1.25rem}
.session-tab{font-family:var(--font-display);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.6rem 0.9rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);cursor:pointer;transition:color var(--transition),border-color var(--transition)}
.session-tab:hover{color:var(--text-mid)}
.session-tab.active{border-bottom-color:var(--accent);color:var(--accent-s)}
.pane{display:none}.pane.active{display:block}
.session-form{display:flex;flex-direction:column;gap:0.55rem}
.empty-state{text-align:center;color:var(--text-faint);font-style:italic;font-size:0.85rem;padding:2.5rem 0}
.recap-delete{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:0.75rem;padding:0.1rem 0.3rem;transition:color var(--transition)}
.recap-delete:hover{color:var(--red-s)}
</style>
</head>
<body>
<header class="site-header">
  <div class="brand">
    <a href="index.html" class="back-link">&larr; Hub</a>
    <h1 style="font-size:1.2rem;margin-top:0.15rem">Session Log</h1>
  </div>
  <button class="btn btn-icon" id="themeToggle">&#9728;</button>
</header>

<main class="page-wrap" style="padding-top:1rem;padding-bottom:2rem">

  <div class="session-tabs">
    <button class="session-tab active" onclick="switchTab('recap',this)">Recap</button>
    <button class="session-tab" onclick="switchTab('journal',this)">Journal</button>
  </div>

  <!-- RECAP -->
  <div class="pane active" id="pane-recap">
    <p class="section-intro">A running record of each session — your previously-on reference.</p>
    <div class="surface-box session-form mb-md">
      <p class="eyebrow" style="margin-bottom:0.6rem">Log a Session</p>
      <label class="field-label">Session name / number</label>
      <input type="text" id="recapSession" placeholder="e.g. Session 3">
      <label class="field-label mt-sm">Area reached</label>
      <input type="text" id="recapArea" placeholder="e.g. Cathedral Ward">
      <label class="field-label mt-sm">Bosses defeated</label>
      <input type="text" id="recapBosses" placeholder="e.g. Cleric Beast, Father Gascoigne">
      <label class="field-label mt-sm">Notes / highlights</label>
      <textarea id="recapNotes" rows="3" placeholder="What happened? What was memorable?"></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;padding:0.55rem" onclick="addRecap()">Save Session</button>
    </div>
    <div id="recap-list"></div>
  </div>

  <!-- JOURNAL -->
  <div class="pane" id="pane-journal">
    <p class="section-intro">Theories, questions, moments worth remembering.</p>
    <div class="surface-box mb-md">
      <textarea id="journalInput" rows="3" placeholder="Write a note, theory, or question..."></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;padding:0.5rem" onclick="addJournalEntry()">Add Entry</button>
    </div>
    <div id="journal-list"></div>
  </div>

</main>

<footer class="site-footer">Fear the Old Blood &nbsp;&middot;&nbsp; <a href="index.html" style="color:var(--text-faint)">&larr; Back to Hub</a></footer>

<script>
var state={
  recaps: JSON.parse(localStorage.getItem('bb-recaps')||'[]'),
  journal: JSON.parse(localStorage.getItem('bb-journal')||'[]')
};

function save(){
  localStorage.setItem('bb-recaps',JSON.stringify(state.recaps));
  localStorage.setItem('bb-journal',JSON.stringify(state.journal));
}

function switchTab(name,btn){
  document.querySelectorAll('.session-tab').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
}

// ── RECAP ────────────────────────────────────────────────────────────────────
function renderRecaps(){
  var list=document.getElementById('recap-list');
  if(!state.recaps.length){list.innerHTML='<p class="empty-state">No sessions logged yet.</p>';return;}
  var h='';
  state.recaps.forEach(function(r,i){
    h+='<div class="recap-card">'
      +'<div class="recap-header">'
        +'<span style="font-weight:600;font-family:var(--font-display);font-size:0.88rem">'+r.session+'</span>'
        +'<div style="display:flex;align-items:center;gap:0.5rem">'
          +'<span style="font-size:0.62rem;color:var(--text-faint)">'+r.date+'</span>'
          +'<button class="recap-delete" onclick="deleteRecap('+i+')" title="Delete">&#10005;</button>'
        +'</div>'
      +'</div>'
      +'<div class="recap-body">'
        +(r.area?'<div class="recap-row">Area: '+r.area+'</div>':'')
        +(r.bosses?'<div class="recap-row bosses">Bosses: '+r.bosses+'</div>':'')
        +(r.notes?'<div class="recap-notes">'+r.notes+'</div>':'')
      +'</div>'
    +'</div>';
  });
  list.innerHTML=h;
}

function addRecap(){
  var s=document.getElementById('recapSession').value.trim();
  if(!s)return;
  state.recaps.unshift({
    session:s,
    area:document.getElementById('recapArea').value.trim(),
    bosses:document.getElementById('recapBosses').value.trim(),
    notes:document.getElementById('recapNotes').value.trim(),
    date:new Date().toLocaleDateString()
  });
  save();
  ['recapSession','recapArea','recapBosses','recapNotes'].forEach(function(id){document.getElementById(id).value='';});
  renderRecaps();
}

function deleteRecap(i){
  state.recaps.splice(i,1);
  save();
  renderRecaps();
}

// ── JOURNAL ───────────────────────────────────────────────────────────────────
function renderJournal(){
  var list=document.getElementById('journal-list');
  if(!state.journal.length){list.innerHTML='<p class="empty-state">No entries yet. The night is long.</p>';return;}
  var h='';
  state.journal.forEach(function(e,i){
    h+='<div class="journal-entry">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem">'
        +'<div class="journal-entry-text">'+e.text+'</div>'
        +'<button class="recap-delete" onclick="deleteJournal('+i+')" title="Delete">&#10005;</button>'
      +'</div>'
      +'<div class="journal-entry-time">'+e.time+'</div>'
    +'</div>';
  });
  list.innerHTML=h;
}

function addJournalEntry(){
  var el=document.getElementById('journalInput'),text=el.value.trim();
  if(!text)return;
  state.journal.unshift({text:text,time:new Date().toLocaleString()});
  el.value='';save();renderJournal();
}

function deleteJournal(i){
  state.journal.splice(i,1);
  save();
  renderJournal();
}

document.getElementById('journalInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addJournalEntry();}
});

// ── THEME ─────────────────────────────────────────────────────────────────────
var tt=document.getElementById('themeToggle');
var dark=localStorage.getItem('bb-theme')!=='light';
if(!dark){document.documentElement.setAttribute('data-theme','light');tt.textContent='\uD83C\uDF19';}
tt.addEventListener('click',function(){
  dark=!dark;
  if(dark){document.documentElement.removeAttribute('data-theme');tt.textContent='\u2600';localStorage.setItem('bb-theme','dark');}
  else{document.documentElement.setAttribute('data-theme','light');tt.textContent='\uD83C\uDF19';localStorage.setItem('bb-theme','light');}
});

renderRecaps();
renderJournal();
</script>
</body>
</html>
