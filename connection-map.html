<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Map — Bloodborne</title>
<link rel="stylesheet" href="shared.css">
<style>
body{overflow:hidden}
.map-header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:0.65rem 1rem;background:rgba(12,10,9,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.map-controls{display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap}
#mapCanvas{position:fixed;top:0;left:0;cursor:grab;touch-action:none}
#mapCanvas.dragging{cursor:grabbing}
.filter-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;gap:0.35rem;padding:0.5rem 0.75rem;background:rgba(12,10,9,0.92);border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;backdrop-filter:blur(8px)}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.22rem 0.55rem;border-radius:9999px;border:1px solid;background:transparent;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.detail-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,8,7,0.97);border-top:1px solid var(--border);padding:0.85rem 1rem;transform:translateY(100%);transition:transform 0.25s ease;max-height:50vh;overflow-y:auto;backdrop-filter:blur(12px)}
.detail-panel.visible{transform:translateY(0)}
.detail-panel-title{font-family:var(--font-display);font-size:1rem;font-weight:600;margin-bottom:0.1rem}
.detail-panel-faction{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;font-family:var(--font-display);margin-bottom:0.5rem}
.detail-panel-desc{font-size:0.82rem;color:var(--text-mid);line-height:1.6;margin-bottom:0.65rem}
.connections-title{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);font-family:var(--font-display);margin-bottom:0.4rem}
.conn-chips{display:flex;flex-wrap:wrap;gap:0.3rem}
.conn-chip{font-size:0.65rem;padding:0.2rem 0.55rem;border-radius:3px;border:1px solid;cursor:pointer;transition:opacity 0.15s;font-family:var(--font-body)}
.conn-chip:hover{opacity:0.75}
.close-btn{position:absolute;top:0.7rem;right:0.85rem;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:1rem;line-height:1}
.instructions{position:fixed;bottom:3.5rem;left:50%;transform:translateX(-50%);font-size:0.58rem;letter-spacing:0.15em;color:var(--text-faint);font-family:var(--font-display);text-transform:uppercase;pointer-events:none;white-space:nowrap;transition:opacity 0.3s}
.legend-panel{position:fixed;top:4.5rem;right:0.75rem;z-index:150;background:rgba(10,8,7,0.96);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem;min-width:170px;display:none}
.legend-panel.visible{display:block}
.legend-title{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-family:var(--font-display);margin-bottom:0.5rem}
.legend-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem}
.legend-line{width:24px;height:0;border-bottom:1.5px solid}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid;flex-shrink:0}
.legend-label{font-size:0.68rem;color:var(--text-mid)}
</style>
</head>

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
var canvas=document.getElementById('mapCanvas');
var ctx=canvas.getContext('2d');
var W,H;
var pan={x:0,y:0},zoom=0.82;
var selectedId=null,hoveredId=null,filterFaction='all';
// ── Pan physics ──────────────────────────────────────────────────────────────
var dragging=false,dragStart={x:0,y:0},panStart={x:0,y:0};
var panVel={x:0,y:0},lastPanPos={x:0,y:0},lastPanTime=0;
var PAN_FRICTION=0.88,PAN_MIN=0.3;
var dragMoved=false;
var panRafId=null;

// ── Node drag & force simulation ─────────────────────────────────────────────
var draggingNode=null,nodeDragMoved=false;
// Per-node velocity for force simulation
NODES.forEach(function(n){n.vx=0;n.vy=0;});
var simRafId=null,simRunning=false;

// Force constants
var REPULSION   = 18000;   // push apart
var SPRING_LEN  = 120;     // ideal edge length
var SPRING_K    = 0.04;    // spring stiffness
var SIM_DAMPING = 0.7;     // velocity damping per tick
var SIM_MIN_VEL = 0.08;    // stop threshold
var darkMode=localStorage.getItem('bb-theme')!=='light';
var hitRadius=22;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  draw();
}
window.addEventListener('resize',resize);

function resetView(){pan={x:0,y:0};zoom=0.82;draw();}

// ─── THEMING ─────────────────────────────────────────────────────────────────
var tt=document.getElementById('themeToggle');
if(!darkMode){document.documentElement.setAttribute('data-theme','light');tt.textContent='\uD83C\uDF19';}
tt.addEventListener('click',function(){
  darkMode=!darkMode;
  if(darkMode){document.documentElement.removeAttribute('data-theme');tt.textContent='\u2600';localStorage.setItem('bb-theme','dark');}
  else{document.documentElement.setAttribute('data-theme','light');tt.textContent='\uD83C\uDF19';localStorage.setItem('bb-theme','light');}
  draw();
});

function bgColor(){return darkMode?'#0c0a09':'#f0ebe2';}
function nodeTextColor(){return darkMode?'#e8e2d9':'#1c1812';}

// ─── WORLD TO SCREEN ─────────────────────────────────────────────────────────
function toScreen(x,y){return{x:x*zoom+pan.x+W/2-500*zoom,y:y*zoom+pan.y+H/2-380*zoom};}
function toWorld(sx,sy){return{x:(sx-pan.x-W/2+500*zoom)/zoom,y:(sy-pan.y-H/2+380*zoom)/zoom};}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=bgColor();
  ctx.fillRect(0,0,W,H);

  var focusId=selectedId||hoveredId;
  var connSet=new Set();
  if(focusId){
    EDGES.forEach(function(e){if(e.a===focusId||e.b===focusId){connSet.add(e.a);connSet.add(e.b);}});
  }

  var visNodes=filterFaction==='all'?NODES:NODES.filter(function(n){return n.f===filterFaction;});
  var visIds=new Set(visNodes.map(function(n){return n.id;}));
  var visEdges=EDGES.filter(function(e){return visIds.has(e.a)&&visIds.has(e.b);});

  // Edges
  visEdges.forEach(function(e){
    var na=NODES.find(function(n){return n.id===e.a;}),nb=NODES.find(function(n){return n.id===e.b;});
    if(!na||!nb)return;
    var sa=toScreen(na.x,na.y),sb=toScreen(nb.x,nb.y);
    var et=EDGE_TYPES[e.type]||EDGE_TYPES.lore;
    var isFocus=focusId&&(e.a===focusId||e.b===focusId);
    var isDimmed=focusId&&!isFocus;
    ctx.globalAlpha=isDimmed?0.07:isFocus?0.95:0.3;
    ctx.strokeStyle=et.color;
    ctx.lineWidth=(isFocus?2:1)*zoom;
    ctx.setLineDash(et.dash?[6*zoom,4*zoom]:[]);
    ctx.beginPath();ctx.moveTo(sa.x,sa.y);ctx.lineTo(sb.x,sb.y);ctx.stroke();
    if(isFocus&&e.label){
      var mx=(sa.x+sb.x)/2,my=(sa.y+sb.y)/2;
      ctx.globalAlpha=0.85;
      ctx.font=Math.max(9,10*zoom)+'px Palatino,serif';
      ctx.fillStyle=et.color;
      ctx.textAlign='center';
      ctx.fillText(e.label,mx,my-4*zoom);
    }
    ctx.setLineDash([]);
  });

  // Nodes
  visNodes.forEach(function(n){
    var s=toScreen(n.x,n.y);
    var fac=FACTIONS[n.f];
    var isSelected=n.id===selectedId;
    var isHovered=n.id===hoveredId;
    var isConn=connSet.has(n.id);
    var isDimmed=focusId&&!isConn&&n.id!==focusId;
    var r=(n.id==='moon'||n.id==='dream'?20:14)*zoom;
    ctx.globalAlpha=isDimmed?0.12:1;

    // Pulse ring
    if(isSelected||isHovered){
      ctx.globalAlpha=isDimmed?0:0.3;
      ctx.beginPath();ctx.arc(s.x,s.y,r+6*zoom,0,Math.PI*2);
      ctx.strokeStyle=fac.glow;ctx.lineWidth=1.5*zoom;ctx.stroke();
    }

    // Node circle
    ctx.globalAlpha=isDimmed?0.12:0.9;
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle=fac.color;ctx.fill();
    ctx.strokeStyle=isSelected||isHovered?fac.glow:fac.color;
    ctx.lineWidth=(isSelected?2.5:1.5)*zoom;ctx.stroke();

    // Label
    ctx.globalAlpha=isDimmed?0.12:1;
    ctx.font='bold '+Math.max(8,9*zoom)+'px Palatino,serif';
    ctx.fillStyle=nodeTextColor();
    ctx.textAlign='center';
    ctx.fillText(n.label,s.x,s.y+r+Math.max(10,12*zoom));
  });

  ctx.globalAlpha=1;
  ctx.setLineDash([]);
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
function nodeAt(sx,sy){
  var w=toWorld(sx,sy);
  for(var i=0;i<NODES.length;i++){
    var n=NODES[i];
    var dx=n.x-w.x,dy=n.y-w.y;
    var r=(n.id==='moon'||n.id==='dream'?20:14);
    if(dx*dx+dy*dy<(r+8)*(r+8))return n;
  }
  return null;
}

// ─── PAN MOMENTUM ────────────────────────────────────────────────────────────
function panLoop(){
  panVel.x*=PAN_FRICTION;panVel.y*=PAN_FRICTION;
  if(Math.abs(panVel.x)<PAN_MIN&&Math.abs(panVel.y)<PAN_MIN){
    panVel.x=0;panVel.y=0;panRafId=null;return;
  }
  pan.x+=panVel.x;pan.y+=panVel.y;
  if(!simRunning)draw();
  panRafId=requestAnimationFrame(panLoop);
}
function startPanPhysics(){
  if(panRafId)cancelAnimationFrame(panRafId);
  panRafId=requestAnimationFrame(panLoop);
}

// ─── FORCE SIMULATION ────────────────────────────────────────────────────────
function simStep(){
  var nodes=NODES;
  var edges=EDGES;
  var maxV=0;

  // Zero forces
  nodes.forEach(function(n){n.fx=0;n.fy=0;});

  // Repulsion between all pairs
  for(var i=0;i<nodes.length;i++){
    for(var j=i+1;j<nodes.length;j++){
      var a=nodes[i],b=nodes[j];
      var dx=b.x-a.x,dy=b.y-a.y;
      var dist2=dx*dx+dy*dy+0.01;
      var dist=Math.sqrt(dist2);
      var force=REPULSION/dist2;
      var fx=force*dx/dist,fy=force*dy/dist;
      a.fx-=fx;a.fy-=fy;
      b.fx+=fx;b.fy+=fy;
    }
  }

  // Spring attraction along edges
  edges.forEach(function(e){
    var a=nodes.find(function(n){return n.id===e.a;});
    var b=nodes.find(function(n){return n.id===e.b;});
    if(!a||!b)return;
    var dx=b.x-a.x,dy=b.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy)+0.01;
    var stretch=dist-SPRING_LEN;
    var force=SPRING_K*stretch;
    var fx=force*dx/dist,fy=force*dy/dist;
    if(a!==draggingNode){a.fx+=fx;a.fy+=fy;}
    if(b!==draggingNode){b.fx-=fx;b.fy-=fy;}
  });

  // Integrate
  nodes.forEach(function(n){
    if(n===draggingNode)return;
    n.vx=(n.vx+n.fx)*SIM_DAMPING;
    n.vy=(n.vy+n.fy)*SIM_DAMPING;
    n.x+=n.vx;
    n.y+=n.vy;
    var v=Math.abs(n.vx)+Math.abs(n.vy);
    if(v>maxV)maxV=v;
  });

  draw();

  if(maxV>SIM_MIN_VEL||draggingNode){
    simRafId=requestAnimationFrame(simStep);
  } else {
    simRunning=false;simRafId=null;
    // Dampen all remaining velocities to zero
    nodes.forEach(function(n){n.vx=0;n.vy=0;});
    draw();
  }
}

function startSim(){
  if(simRafId)cancelAnimationFrame(simRafId);
  simRunning=true;
  simRafId=requestAnimationFrame(simStep);
}

function stopSim(){
  if(simRafId){cancelAnimationFrame(simRafId);simRafId=null;}
  simRunning=false;
}

// ─── MOUSE ────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown',function(e){
  if(panRafId){cancelAnimationFrame(panRafId);panRafId=null;}
  panVel.x=0;panVel.y=0;
  var n=nodeAt(e.clientX,e.clientY);
  if(n){
    draggingNode=n;nodeDragMoved=false;
    dragStart={x:e.clientX,y:e.clientY};
    // Pin this node while dragging
    n.vx=0;n.vy=0;
    if(!simRunning)startSim();
    return;
  }
  dragging=true;dragMoved=false;
  canvas.classList.add('dragging');
  dragStart={x:e.clientX,y:e.clientY};
  panStart={x:pan.x,y:pan.y};
  lastPanPos={x:e.clientX,y:e.clientY};
  lastPanTime=Date.now();
});

canvas.addEventListener('mousemove',function(e){
  if(draggingNode){
    var dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
    if(!nodeDragMoved&&Math.sqrt(dx*dx+dy*dy)>4)nodeDragMoved=true;
    if(nodeDragMoved){
      var w=toWorld(e.clientX,e.clientY);
      draggingNode.x=w.x;draggingNode.y=w.y;
      draggingNode.vx=0;draggingNode.vy=0;
      canvas.style.cursor='grabbing';
    }
    return;
  }
  if(dragging){
    var now=Date.now();
    var dt=Math.max(1,now-lastPanTime);
    panVel.x=(e.clientX-lastPanPos.x)*(16/dt);
    panVel.y=(e.clientY-lastPanPos.y)*(16/dt);
    lastPanPos={x:e.clientX,y:e.clientY};
    lastPanTime=now;
    pan.x=panStart.x+(e.clientX-dragStart.x);
    pan.y=panStart.y+(e.clientY-dragStart.y);
    dragMoved=true;
    if(!simRunning)draw();
    return;
  }
  var n=nodeAt(e.clientX,e.clientY);
  var newH=n?n.id:null;
  if(newH!==hoveredId){hoveredId=newH;canvas.style.cursor=n?'pointer':'grab';if(!simRunning)draw();}
});

canvas.addEventListener('mouseup',function(){
  if(draggingNode){
    if(!nodeDragMoved)selectNode(draggingNode.id);
    else startSim(); // release — let sim settle
    canvas.style.cursor='grab';
    draggingNode=null;nodeDragMoved=false;
    return;
  }
  if(dragging){
    dragging=false;canvas.classList.remove('dragging');
    if(!dragMoved&&selectedId){closeDetail();return;}
    startPanPhysics();
  }
});

canvas.addEventListener('mouseleave',function(){
  if(draggingNode){startSim();draggingNode=null;nodeDragMoved=false;}
  if(dragging){dragging=false;canvas.classList.remove('dragging');startPanPhysics();}
});

canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var f=e.deltaY<0?1.08:0.93;
  zoom=Math.min(2.5,Math.max(0.25,zoom*f));
  if(!simRunning)draw();
},{passive:false});

// ─── TOUCH ────────────────────────────────────────────────────────────────────
var touches={};
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(panRafId){cancelAnimationFrame(panRafId);panRafId=null;}
  panVel.x=0;panVel.y=0;
  if(e.touches.length===1){
    var t=e.touches[0];
    dragMoved=false;nodeDragMoved=false;
    touches.startTime=Date.now();
    var n=nodeAt(t.clientX,t.clientY);
    if(n){
      draggingNode=n;
      dragStart={x:t.clientX,y:t.clientY};
      n.vx=0;n.vy=0;
      if(!simRunning)startSim();
      return;
    }
    dragging=true;
    dragStart={x:t.clientX,y:t.clientY};
    panStart={x:pan.x,y:pan.y};
    lastPanPos={x:t.clientX,y:t.clientY};
    lastPanTime=Date.now();
  } else if(e.touches.length===2){
    dragging=false;draggingNode=null;
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    touches.pinchDist=Math.sqrt(dx*dx+dy*dy);
    touches.pinchZoom=zoom;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1){
    var t=e.touches[0];
    if(draggingNode){
      var dx=t.clientX-dragStart.x,dy=t.clientY-dragStart.y;
      if(!nodeDragMoved&&Math.sqrt(dx*dx+dy*dy)>6)nodeDragMoved=true;
      if(nodeDragMoved){
        var w=toWorld(t.clientX,t.clientY);
        draggingNode.x=w.x;draggingNode.y=w.y;
        draggingNode.vx=0;draggingNode.vy=0;
      }
      return;
    }
    if(dragging){
      var now=Date.now();
      var dt=Math.max(1,now-lastPanTime);
      panVel.x=(t.clientX-lastPanPos.x)*(16/dt);
      panVel.y=(t.clientY-lastPanPos.y)*(16/dt);
      lastPanPos={x:t.clientX,y:t.clientY};
      lastPanTime=now;
      pan.x=panStart.x+(t.clientX-dragStart.x);
      pan.y=panStart.y+(t.clientY-dragStart.y);
      dragMoved=true;
      if(!simRunning)draw();
    }
  } else if(e.touches.length===2&&touches.pinchDist){
    var dx=e.touches[0].clientX-e.touches[1].clientX;
    var dy=e.touches[0].clientY-e.touches[1].clientY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    zoom=Math.min(2.5,Math.max(0.25,touches.pinchZoom*(dist/touches.pinchDist)));
    if(!simRunning)draw();
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){
  if(draggingNode){
    var elapsed=Date.now()-(touches.startTime||0);
    if(!nodeDragMoved&&elapsed<250)selectNode(draggingNode.id);
    else startSim();
    draggingNode=null;nodeDragMoved=false;
    touches={};return;
  }
  if(dragging){
    dragging=false;
    var elapsed=Date.now()-(touches.startTime||0);
    if(!dragMoved&&elapsed<250&&selectedId){closeDetail();touches={};return;}
    startPanPhysics();
  }
  touches={};
});

// ─── DETAIL PANEL ─────────────────────────────────────────────────────────────
function selectNode(id){
  selectedId=selectedId===id?null:id;
  if(selectedId){
    var n=NODES.find(function(x){return x.id===id;});
    var fac=FACTIONS[n.f];
    document.getElementById('dpTitle').textContent=n.label;
    document.getElementById('dpTitle').style.color=fac.glow;
    document.getElementById('dpFaction').textContent=fac.label;
    document.getElementById('dpFaction').style.color=fac.color;
    document.getElementById('dpDesc').textContent=n.desc;
    var edges=EDGES.filter(function(e){return e.a===id||e.b===id;});
    var chips='';
    edges.forEach(function(e){
      var oid=e.a===id?e.b:e.a;
      var on=NODES.find(function(x){return x.id===oid;});
      if(!on)return;
      var et=EDGE_TYPES[e.type]||EDGE_TYPES.lore;
      var arrow=e.a===id?'&rarr;':'&larr;';
      chips+='<span class="conn-chip" style="color:'+et.color+';border-color:'+et.color+'40;background:'+et.color+'15" onclick="selectNode(\''+oid+'\')">'+arrow+' '+on.label+' <span style="opacity:0.55;font-size:0.58rem">('+e.label+')</span></span>';
    });
    document.getElementById('dpChips').innerHTML=chips||'<span style="font-size:0.75rem;color:var(--text-faint)">No direct connections</span>';
    document.getElementById('detailPanel').classList.add('visible');
    document.getElementById('instructions').style.opacity='0';
  } else {
    closeDetail();
  }
  draw();
}

function closeDetail(){selectedId=null;document.getElementById('detailPanel').classList.remove('visible');document.getElementById('instructions').style.opacity='1';draw();}

// ─── FILTER BAR ───────────────────────────────────────────────────────────────
var fb=document.getElementById('filterBar');
Object.entries(FACTIONS).forEach(function(entry){
  var key=entry[0],fac=entry[1];
  var btn=document.createElement('button');
  btn.className='filter-btn';btn.setAttribute('data-faction',key);
  btn.style.borderColor=fac.color+'80';btn.style.color=fac.color;
  btn.textContent=fac.label;
  btn.addEventListener('click',function(){setFilter(key);});
  fb.appendChild(btn);
});

function setFilter(fac){
  filterFaction=fac;
  document.querySelectorAll('.filter-btn').forEach(function(b){
    var k=b.getAttribute('data-faction');
    var f=k==='all'?{color:'var(--text-faint)'}:FACTIONS[k];
    var isActive=k===fac;
    b.style.background=isActive?(k==='all'?'rgba(120,112,100,0.25)':FACTIONS[k].color+'25'):'transparent';
    b.style.color=isActive?(k==='all'?'var(--text)':FACTIONS[k].glow):(k==='all'?'var(--text-faint)':FACTIONS[k].color);
  });
  selectedId=null;closeDetail();draw();
}

// ─── LEGEND ───────────────────────────────────────────────────────────────────
function toggleLegend(){document.getElementById('legendPanel').classList.toggle('visible');}
function buildLegend(){
  var eh='';
  Object.entries(EDGE_TYPES).forEach(function(e){
    eh+='<div class="legend-row"><svg width="24" height="8" style="flex-shrink:0"><line x1="0" y1="4" x2="24" y2="4" stroke="'+e[1].color+'" stroke-width="1.5" stroke-dasharray="'+( e[1].dash?'5,3':'none')+'"/></svg><span class="legend-label">'+e[1].label+'</span></div>';
  });
  document.getElementById('legendEdges').innerHTML=eh;
  var fh='';
  Object.entries(FACTIONS).forEach(function(e){
    fh+='<div class="legend-row"><div class="legend-dot" style="background:'+e[1].color+';border-color:'+e[1].glow+'"></div><span class="legend-label">'+e[1].label+'</span></div>';
  });
  document.getElementById('legendFactions').innerHTML=fh;
}
buildLegend();

resize();
</script>
</body>
